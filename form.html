<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My form</title>
    <style>
        body{
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 150px;
        }
    </style>
</head>
<body>
    <form action="#" onsubmit="fetchdetails(event)"> 
                <label>Name:</label>
                <input type="text" id="fname" name="fname" placeholder="enter name">
                <br>
                <br>
                <label>email:</label>
                <input type="text" id="email" name="email" placeholder="enter mail">
                <br>
                <br>
                <label>gender:</label>
                <input type="radio" id="male" name="gender" value="male">Male
                <input type="radio" id="female" name="gender" value="female">Female
                <br>
                <br>
                <label for="language">Language:</label>

                <input for= "hindi" type="checkbox" id="hindi" name="language" value="hindi">
                <label for="hindi">Hindi</label>

                <input for= "english" type="checkbox" id="english" name="language" value="english">
                <label for="english">english</label>

                <input for= "gujarati" type="checkbox" id="gujarati" name="language" value="gujarati">
                <label for="gujarati">gujarati</label>
                    <br>
                    <br>
                <input type="submit" value="submit">
    </form>
</body>
<script>
    
    function fetchdetails(e){
        e.preventDefault()
    const name = document.getElementById("fname").value;
    const email = document.getElementById("email").value;
    const male  = document.getElementsByTagName("male").value;

    const details = {
        name,
        email,
        male,
    }
    console.log(details);         
    }
</script>
</html>
